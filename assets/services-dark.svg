<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 250" width="1000" height="250" role="img" aria-label="System status: backend, distributed systems, AI infrastructure and open source running">
  <rect width="1000" height="250" fill="#0D1117"/>
  <g font-family="ui-monospace,'SF Mono','Cascadia Code','JetBrains Mono',monospace" font-size="15">
    <text x="28" y="40" fill="#3FB950">$ <tspan fill="#E6EDF3">services</tspan> <tspan fill="#8B949E">--status</tspan></text>
    <line x1="28" y1="56" x2="972" y2="56" stroke="#30363D"/>

    <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.25s" fill="freeze"/>
      <circle cx="34" cy="88" r="5" fill="#3FB950"/>
      <text x="52" y="93" fill="#E6EDF3">backend</text>
      <text x="620" y="93" fill="#3FB950">running</text>
    </g>
    <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.25s" fill="freeze"/>
      <circle cx="34" cy="120" r="5" fill="#3FB950"/>
      <text x="52" y="125" fill="#E6EDF3">distributed-systems</text>
      <text x="620" y="125" fill="#3FB950">running</text>
    </g>
    <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.9s" dur="0.25s" fill="freeze"/>
      <circle cx="34" cy="152" r="5" fill="#3FB950"/>
      <text x="52" y="157" fill="#E6EDF3">ai-infrastructure</text>
      <text x="620" y="157" fill="#3FB950">running</text>
    </g>
    <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.25s" fill="freeze"/>
      <circle cx="34" cy="184" r="5" fill="#3FB950"/>
      <text x="52" y="189" fill="#E6EDF3">open-source</text>
      <text x="620" y="189" fill="#3FB950">active</text>
    </g>
    <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.25s" fill="freeze"/>
      <circle cx="34" cy="216" r="5" fill="#00ADD8">
        <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" begin="1.8s" repeatCount="indefinite"/></circle>
      <text x="52" y="221" fill="#E6EDF3">learning</text>
      <text x="620" y="221" fill="#00ADD8">kubernetes</text>
    </g>
  </g>
</svg>
